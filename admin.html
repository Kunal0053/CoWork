<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  padding: 20px;
}

h1 {
  text-align: center;
}

.section {
  background: white;
  padding: 20px;
  margin: 20px 0;
  border-radius: 10px;
}

.card {
  display: flex;
  align-items: center;
  gap: 15px;
  border: 1px solid #ddd;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
}

img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  object-fit: cover;
}

button {
  margin: 5px;
  padding: 6px 10px;
  cursor: pointer;
  border: none;
  border-radius: 5px;
}

.approve { background: green; color: white; }
.reject { background: red; color: white; }
.delete { background: black; color: white; }
.logout { background: #333; color: white; float: right; }

.info {
  flex: 1;
}

.status {
  font-size: 12px;
  color: #666;
}
</style>

</head>

<body>

<h1>⚙️ Admin Panel</h1>
<button class="logout" onclick="logout()">Logout</button>

<!-- WORKERS -->
<div class="section">
<h2>👷 All Workers</h2>
<div id="workers"></div>
</div>

<!-- BOOKINGS -->
<div class="section">
<h2>📊 Bookings</h2>
<div id="bookings"></div>
</div>

<script>

const token = localStorage.getItem("token");

// Redirect if not logged in
if (!token) {
  window.location.href = "admin-login.html";
}

// ================= LOAD WORKERS =================
async function loadWorkers() {
  const res = await fetch("http://localhost:3000/admin/all-workers", {
    headers: { "Authorization": token }
  });

  if (res.status !== 200) {
    alert("Unauthorized");
    logout();
    return;
  }

  const data = await res.json();
  const container = document.getElementById("workers");
  container.innerHTML = "";

  if (data.length === 0) {
    container.innerHTML = "No workers found";
    return;
  }

  data.forEach(w => {
    container.innerHTML += `
      <div class="card">

        <img src="${w.photo ? 'http://localhost:3000/uploads/' + w.photo : 'https://via.placeholder.com/60'}">

        <div class="info">
          <b>${w.name}</b><br>
          ${w.skill} | ${w.location}<br>
          <span class="status">Status: ${w.status}</span>
        </div>

        ${w.status === "pending" ? `
          <button class="approve" onclick="approve('${w._id}')">Approve</button>
          <button class="reject" onclick="reject('${w._id}')">Reject</button>
        ` : ""}

        <button class="delete" onclick="deleteWorker('${w._id}')">Delete</button>

      </div>
    `;
  });
}

// ================= APPROVE =================
async function approve(id) {
  await fetch(`http://localhost:3000/admin/approve/${id}`, {
    method: "PUT",
    headers: { "Authorization": token }
  });

  loadWorkers();
}

// ================= REJECT =================
async function reject(id) {
  await fetch(`http://localhost:3000/admin/reject/${id}`, {
    method: "PUT",
    headers: { "Authorization": token }
  });

  loadWorkers();
}

// ================= DELETE =================
async function deleteWorker(id) {
  if (!confirm("Are you sure you want to delete this worker?")) return;

  await fetch(`http://localhost:3000/admin/delete/${id}`, {
    method: "DELETE",
    headers: { "Authorization": token }
  });

  alert("Worker deleted");
  loadWorkers();
}

// ================= BOOKINGS =================
async function loadBookings() {
  const res = await fetch("http://localhost:3000/admin/bookings", {
    headers: { "Authorization": token }
  });

  const data = await res.json();
  const container = document.getElementById("bookings");
  container.innerHTML = "";

  if (data.length === 0) {
    container.innerHTML = "No bookings yet";
    return;
  }

  data.forEach(b => {
    container.innerHTML += `
      <div class="card">
        <div class="info">
          <b>${b.workerName}</b><br>
          ${b.skill} | ${b.location}<br>
          <small>${new Date(b.time).toLocaleString()}</small>
        </div>
      </div>
    `;
  });
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("token");
  window.location.href = "admin-login.html";
}

// ================= INIT =================
loadWorkers();
loadBookings();

</script>

</body>
</html>
